<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <meta name="description" content="Product Preview Card is a web challenge from Frontend Mentor.">   
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | Product Preview Card</title>
  <link rel="stylesheet" href="./styles/base.css">
  <link rel="stylesheet" href="./styles/custom.css">
  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="overflow-auto">
  <!-- Header -->
  <header class="hide">
    <h1 id="headline">Product Preview Card</h1>
  </header>
  <!-- Main -->
  <main>
    <section class="card-container">
      <picture class="card-image">
        <source media="(width < 720px)" srcset="images/image-product-mobile.jpg" />
        <img src="images/image-product-desktop.jpg" alt="Gabrielle Essence Eau De Parfum" />
      </picture>
      <div class="card-content">
        <span class="category typo-montserrat-500">Perfume</span>
        <h2 class="title typo-fraunces-700">Gabrielle Essence Eau De Parfum</h2>
        <p class="typo-montserrat-500">A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL.</p>
        <div class="card-prices">
          <h2 class="price typo-fraunces-700">$149.99</h2>
          <del class="typo-montserrat-500">$169.99</del>
        </div>
        <button class="card-btn typo-montserrat-500">
          <img src="images/icon-cart.svg" class="icon-cart" alt="Icon Cart"/>
          Add to Cart
        </button>
      </div>
    </section>
  </main>
  <!-- Footer -->
  <footer class="attribution hide">
    Challenge by <a href="https://www.frontendmentor.io/challenges/..." target="_blank">Frontend Mentor</a>. 
    Coded by <a href="https://www.frontendmentor.io/profile/FedericoMp" target="_blank">@FedericoMp</a>.
  </footer>
</body>
</html>
